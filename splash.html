<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitCore</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#cvs{position:fixed;inset:0;z-index:0;pointer-events:none}
.splash{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse 90% 70% at 50% 48%,#150d00 0%,#080500 50%,#000 100%)}
.ring{position:absolute;border-radius:50%;border:1px solid;animation:rp 3.5s ease-in-out infinite}
.r1{width:380px;height:380px;border-color:rgba(212,170,0,.2);animation-delay:0s}
.r2{width:580px;height:580px;border-color:rgba(212,170,0,.1);animation-delay:.5s}
.r3{width:780px;height:780px;border-color:rgba(212,170,0,.05);animation-delay:1s}
@keyframes rp{0%,100%{transform:scale(1);opacity:.45}50%{transform:scale(1.07);opacity:1}}
.center{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;animation:ci .95s cubic-bezier(.22,1,.36,1) both}
@keyframes ci{from{opacity:0;transform:translateY(30px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
.logo-wrap{position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:24px;animation:lf 4s ease-in-out infinite}
@keyframes lf{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.glow-bg{position:absolute;width:460px;height:300px;background:radial-gradient(ellipse at 50% 58%,rgba(212,170,0,.3) 0%,transparent 65%);border-radius:50%;animation:gp 2.8s ease-in-out infinite;pointer-events:none}
@keyframes gp{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
.bar-wrap{width:250px;display:flex;flex-direction:column;align-items:center;gap:9px}
.bar-track{width:100%;height:2px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,#5a4000,#d4aa00,#ffe880,#d4aa00,#5a4000);background-size:200% 100%;box-shadow:0 0 14px rgba(212,170,0,.85);animation:bf 3.1s cubic-bezier(.4,0,.2,1) .35s both,bs 1.4s linear infinite}
@keyframes bf{from{width:0%}to{width:100%}}
@keyframes bs{0%{background-position:0% 0}100%{background-position:200% 0}}
.bar-lbl{font-family:system-ui,sans-serif;font-size:10px;color:rgba(255,255,255,.16);letter-spacing:.18em;text-transform:uppercase}
.flash{position:fixed;inset:0;z-index:100;background:#000;opacity:0;pointer-events:none;transition:opacity .55s ease}
.flash.on{opacity:1}
</style>
</head>
<body>
<canvas id="cvs"></canvas>
<div class="splash" id="sp">
  <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div>
  <div class="center">
    <div class="logo-wrap">
      <div class="glow-bg"></div>
      <svg width="360" height="225" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="spG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8a6500"/><stop offset="35%" stop-color="#d4aa00"/><stop offset="65%" stop-color="#ffe566"/><stop offset="100%" stop-color="#c49a00"/></linearGradient>
<linearGradient id="spS" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#5a5a5a"/><stop offset="40%" stop-color="#d0d0d0"/><stop offset="70%" stop-color="#f8f8f8"/><stop offset="100%" stop-color="#a0a0a0"/></linearGradient>
<linearGradient id="spB1" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#7a5e00"/><stop offset="100%" stop-color="#d4aa00"/></linearGradient>
<linearGradient id="spB2" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#9a7600"/><stop offset="100%" stop-color="#ffe566"/></linearGradient>
<linearGradient id="spB3" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#aaa"/><stop offset="100%" stop-color="#fff"/></linearGradient>
<linearGradient id="spA" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#c49a00"/><stop offset="100%" stop-color="#ffe566"/></linearGradient>
<linearGradient id="spSw" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7a5e00"/><stop offset="50%" stop-color="#d4aa00"/><stop offset="100%" stop-color="#ffe566"/></linearGradient>
<filter id="spGl"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect x="101" y="72" width="12" height="24" rx="2" fill="url(#spB3)" opacity=".9"/>
<rect x="116" y="60" width="12" height="36" rx="2" fill="url(#spB3)" opacity=".8"/>
<rect x="131" y="48" width="12" height="48" rx="2" fill="url(#spB1)" opacity=".95"/>
<rect x="146" y="38" width="12" height="58" rx="2" fill="url(#spB1)"/>
<rect x="161" y="28" width="12" height="68" rx="2" fill="url(#spB2)"/>
<path d="M88 100 Q160 128 228 88" fill="none" stroke="url(#spSw)" stroke-width="5.5" stroke-linecap="round"/>
<circle cx="88" cy="100" r="5.5" fill="#c49a00"/><circle cx="228" cy="88" r="5.5" fill="#ffe566"/>
<line x1="96" y1="98" x2="212" y2="24" stroke="url(#spA)" stroke-width="5.5" stroke-linecap="round" filter="url(#spGl)"/>
<polygon points="212,12 227,32 197,30" fill="url(#spG)" filter="url(#spGl)"/>
<circle cx="107" cy="68" r="4.5" fill="none" stroke="#d4aa00" stroke-width="1.8"/><circle cx="107" cy="68" r="2" fill="#d4aa00"/>
<circle cx="137" cy="44" r="4.5" fill="none" stroke="#ffe566" stroke-width="1.8"/><circle cx="137" cy="44" r="2" fill="#ffe566"/>
<circle cx="167" cy="24" r="5.5" fill="none" stroke="#ffe566" stroke-width="2.2"/><circle cx="167" cy="24" r="2.5" fill="#ffe566" filter="url(#spGl)"/>
<text x="70" y="138" font-family="Arial Black,sans-serif" font-size="32" font-weight="900" fill="url(#spS)" letter-spacing="1">PROFIT</text>
<text x="196" y="138" font-family="Arial Black,sans-serif" font-size="32" font-weight="900" fill="url(#spG)" letter-spacing="1">CORE</text>
<line x1="70" y1="148" x2="118" y2="148" stroke="#d4aa00" stroke-width="0.8" opacity=".7"/>
<text x="160" y="152" font-family="Arial,sans-serif" font-size="9.5" fill="#d4aa00" text-anchor="middle" letter-spacing="3.5" opacity=".9">MAXIMIZE YOUR GAINS</text>
<line x1="202" y1="148" x2="250" y2="148" stroke="#d4aa00" stroke-width="0.8" opacity=".7"/>
</svg>
    </div>
    <div class="bar-wrap">
      <div class="bar-track"><div class="bar-fill"></div></div>
      <div class="bar-lbl">Acessando plataforma...</div>
    </div>
  </div>
</div>
<div class="flash" id="fl"></div>
<script>
const cv=document.getElementById("cvs"),cx=cv.getContext("2d");
let W,H;
function rsz(){W=cv.width=innerWidth;H=cv.height=innerHeight}rsz();window.addEventListener("resize",rsz);
const pts=Array.from({length:160},()=>({x:Math.random()*1920,y:Math.random()*1080,r:Math.random()*.85+.12,s:Math.random()*.22+.04,a:Math.random()*.6,g:Math.random()>.38,px:Math.random()*6283}));
(function loop(){cx.clearRect(0,0,W,H);const t=Date.now()*.0007;pts.forEach(p=>{p.y-=p.s;p.a=.12+Math.sin(t+p.px)*.2;if(p.y<-3){p.y=H+3;p.x=Math.random()*W}cx.beginPath();cx.arc(p.x*W/1920,p.y*H/1080,p.r,0,Math.PI*2);cx.fillStyle=p.g?"rgba(212,170,0,"+p.a+")":"rgba(255,255,255,"+(p.a*.25)+")";cx.fill()});requestAnimationFrame(loop)})();
function spark(){const d=document.createElement("div");const sz=Math.random()*3+1.5;Object.assign(d.style,{position:"absolute",borderRadius:"50%",background:"#d4aa00",width:sz+"px",height:sz+"px",boxShadow:"0 0 "+(sz*3)+"px "+sz+"px rgba(212,170,0,.9)",left:(innerWidth/2+(Math.random()-.5)*340)+"px",top:(innerHeight/2+(Math.random()-.5)*230)+"px",zIndex:"3",pointerEvents:"none",opacity:"0",transition:"transform 2s ease-out,opacity 2s ease-out"});document.getElementById("sp").appendChild(d);requestAnimationFrame(()=>{d.style.opacity="1";d.style.transform="translateY(-"+(55+Math.random()*80)+"px) translateX("+(Math.random()-.5)*42+"px) scale(.15)";setTimeout(()=>{d.style.opacity="0";setTimeout(()=>d.remove(),650)},1400+Math.random()*700)})}
for(let i=0;i<24;i++)setTimeout(spark,i*140);setInterval(spark,240);
setTimeout(()=>{document.getElementById("fl").classList.add("on");setTimeout(()=>location.href="index.html",560);},3500);
</script>
</body>
</html>
